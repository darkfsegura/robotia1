<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control por Inclinación</title>
<style>
  /* ===================================================================
     CONTROL POR INCLINACION en forma de CRUZ.
     Cada direccion es un CUADRO que se ILUMINA cuando se activa al
     inclinar el celular. Cada cuadro tiene su velocidad independiente.
     =================================================================== */
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #1e293b;
    color: #f1f5f9;
    text-align: center;
    margin: 0;
    padding: 16px;
    user-select: none;
  }
  h1 { font-size: 22px; margin: 8px 0 12px; }

  #estado {
    background: #334155;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 12px;
    font-size: 15px;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 13px 24px;
    font-size: 17px;
    color: white;
    cursor: pointer;
    margin-bottom: 12px;
    width: 100%;
    max-width: 360px;
  }
  .btn-conectar { background: #22c55e; }
  .btn-conectar:active { background: #16a34a; }
  .btn-activar  { background: #f59e0b; }
  .btn-activar:active { background: #d97706; }
  .btn-activar.activo { background: #ef4444; }

  /* La cruz: 3 columnas x 3 filas */
  .cruz {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, auto);
    gap: 10px;
    max-width: 360px;
    margin: 0 auto;
  }
  .celda { display: flex; flex-direction: column; }

  /* CUADRO indicador de direccion (NO es un boton; se ilumina solo) */
  .cuadro {
    border-radius: 12px;
    padding: 18px 0;
    font-size: 17px;
    font-weight: bold;
    color: #94a3b8;
    background: #334155;          /* apagado: gris */
    border: 2px solid #475569;
    transition: all 0.1s;
  }
  /* Cuando la direccion esta ACTIVA, el cuadro se ilumina en azul */
  .cuadro.activo {
    background: #3b82f6;
    color: white;
    border-color: #93c5fd;
    box-shadow: 0 0 14px #3b82f6;
  }

  .mini-vel {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .mini-vel input { flex: 1; min-width: 0; }
  .mini-vel .num { color: #fbbf24; font-weight: bold; width: 30px; font-size: 13px; }

  .vacio { visibility: hidden; }

  /* Cuadro central STOP: se ilumina (rojo) cuando el robot esta detenido */
  .cuadro-stop {
    border-radius: 12px;
    background: #334155;
    border: 2px solid #475569;
    color: #94a3b8;
    font-size: 17px;
    font-weight: bold;
    align-self: stretch;
    transition: all 0.1s;
  }
  .cuadro-stop.activo {
    background: #ef4444;
    color: white;
    border-color: #fca5a5;
    box-shadow: 0 0 14px #ef4444;
  }

  #angulos { color: #94a3b8; font-size: 13px; margin: 14px 0 8px; min-height: 18px; }

  #respuesta {
    background: #334155;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    min-height: 20px;
    max-width: 360px;
    margin: 0 auto;
  }
  .volver { color: #94a3b8; font-size: 14px; display: inline-block; margin-top: 16px; }
</style>
</head>
<body>

  <h1>📱 Control por Inclinación</h1>

  <div id="estado">Desconectado</div>

  <button class="btn btn-conectar" id="btnConectar">Conectar al Robot</button>
  <button class="btn btn-activar" id="btnActivar">Activar Control</button>

  <!-- CRUZ de indicadores -->
  <div class="cruz">

    <!-- Fila 1: [vacio] [ADELANTE] [vacio] -->
    <div class="vacio"></div>
    <div class="celda">
      <div class="cuadro" id="cuadroAd">▲<br>Adelante</div>
      <div class="mini-vel">
        <input type="range" id="velAd" min="0" max="255" value="150"
               oninput="document.getElementById('numAd').textContent=this.value">
        <span class="num" id="numAd">150</span>
      </div>
    </div>
    <div class="vacio"></div>

    <!-- Fila 2: [IZQUIERDA] [STOP] [DERECHA] -->
    <div class="celda">
      <div class="cuadro" id="cuadroGa">◀<br>Izquierda</div>
      <div class="mini-vel">
        <input type="range" id="velGa" min="0" max="255" value="150"
               oninput="document.getElementById('numGa').textContent=this.value">
        <span class="num" id="numGa">150</span>
      </div>
    </div>

    <div class="cuadro-stop activo" id="cuadroStop">■<br>STOP</div>

    <div class="celda">
      <div class="cuadro" id="cuadroGh">▶<br>Derecha</div>
      <div class="mini-vel">
        <input type="range" id="velGh" min="0" max="255" value="150"
               oninput="document.getElementById('numGh').textContent=this.value">
        <span class="num" id="numGh">150</span>
      </div>
    </div>

    <!-- Fila 3: [vacio] [ATRAS] [vacio] -->
    <div class="vacio"></div>
    <div class="celda">
      <div class="cuadro" id="cuadroAt">▼<br>Atras</div>
      <div class="mini-vel">
        <input type="range" id="velAt" min="0" max="255" value="150"
               oninput="document.getElementById('numAt').textContent=this.value">
        <span class="num" id="numAt">150</span>
      </div>
    </div>
    <div class="vacio"></div>

  </div>

  <div id="angulos">Activa el control e inclina el celular</div>
  <div id="respuesta">Respuestas del robot apareceran aqui...</div>

  <br>
  <a class="volver" href="index.html">← Volver al menú</a>

<script>
/* =====================================================================
   LOGICA del control por inclinacion con cuadros que se iluminan.
   ===================================================================== */
const SERVICE_UUID = 0xFFE0;
const CHAR_UUID    = 0xFFE1;

let caracteristica = null;
let controlActivo  = false;

// ----------------------------------------------------------------------
// AJUSTES QUE LOS NIÑOS PUEDEN CAMBIAR:
const UMBRAL = 15;            // Grados de inclinacion para que reaccione.
const ENVIO_CADA_MS = 200;    // Cada cuanto se envia un comando (ms).
// ----------------------------------------------------------------------

const estado    = document.getElementById('estado');
const respuesta = document.getElementById('respuesta');
const angTexto  = document.getElementById('angulos');
const btnActivar= document.getElementById('btnActivar');

// Cuadros indicadores y sus sliders, agrupados por direccion.
const DIRS = {
  ad:   { cuadro: document.getElementById('cuadroAd'), slider: document.getElementById('velAd') },
  at:   { cuadro: document.getElementById('cuadroAt'), slider: document.getElementById('velAt') },
  ga:   { cuadro: document.getElementById('cuadroGa'), slider: document.getElementById('velGa') },
  gh:   { cuadro: document.getElementById('cuadroGh'), slider: document.getElementById('velGh') }
};
const cuadroStop = document.getElementById('cuadroStop');

let ultimoComando = '';
let ultimoEnvio   = 0;

// --- CONECTAR AL ROBOT ---
document.getElementById('btnConectar').addEventListener('click', async () => {
  try {
    estado.textContent = 'Buscando robot...';
    const dispositivo = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'ROBOT' }],
      optionalServices: [SERVICE_UUID]
    });
    dispositivo.addEventListener('gattserverdisconnected', () => {
      estado.textContent = 'Desconectado';
      caracteristica = null;
      desactivarControl();
    });
    estado.textContent = 'Conectando...';
    const servidor = await dispositivo.gatt.connect();
    const servicio = await servidor.getPrimaryService(SERVICE_UUID);
    caracteristica = await servicio.getCharacteristic(CHAR_UUID);
    await caracteristica.startNotifications();
    caracteristica.addEventListener('characteristicvaluechanged', (evento) => {
      respuesta.textContent = '🤖 ' + new TextDecoder().decode(evento.target.value);
    });
    estado.textContent = '✅ Conectado a ' + dispositivo.name;
  } catch (error) {
    estado.textContent = 'Error: ' + error.message;
  }
});

// --- ACTIVAR / DESACTIVAR control por inclinacion ---
btnActivar.addEventListener('click', async () => {
  if (!caracteristica) { estado.textContent = '⚠️ Primero conecta al robot'; return; }

  if (!controlActivo) {
    // Permiso del sensor (iPhone y algunos Android).
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const permiso = await DeviceOrientationEvent.requestPermission();
        if (permiso !== 'granted') { estado.textContent = '⚠️ Permiso de sensor denegado'; return; }
      } catch (e) { estado.textContent = 'Error de permiso: ' + e.message; return; }
    }
    controlActivo = true;
    btnActivar.textContent = 'Desactivar Control';
    btnActivar.classList.add('activo');
    window.addEventListener('deviceorientation', manejarInclinacion);
  } else {
    desactivarControl();
  }
});

function desactivarControl() {
  controlActivo = false;
  btnActivar.textContent = 'Activar Control';
  btnActivar.classList.remove('activo');
  window.removeEventListener('deviceorientation', manejarInclinacion);
  iluminar('stop');
  enviarComando('stop');
}

// Apaga todos los cuadros y enciende solo el de la direccion indicada.
function iluminar(direccion) {
  for (const d in DIRS) DIRS[d].cuadro.classList.remove('activo');
  cuadroStop.classList.remove('activo');
  if (direccion === 'stop') cuadroStop.classList.add('activo');
  else if (DIRS[direccion]) DIRS[direccion].cuadro.classList.add('activo');
}

// --- LEER INCLINACION Y DECIDIR DIRECCION ---
function manejarInclinacion(evento) {
  if (!controlActivo) return;
  const beta  = evento.beta  || 0;   // adelante/atras
  const gamma = evento.gamma || 0;   // izquierda/derecha

  angTexto.textContent =
    'Adelante/Atras: ' + beta.toFixed(0) + '°   Izq/Der: ' + gamma.toFixed(0) + '°';

  let direccion = 'stop';
  if (Math.abs(beta) > Math.abs(gamma)) {
    if (beta > UMBRAL)       direccion = 'at';
    else if (beta < -UMBRAL) direccion = 'ad';
  } else {
    if (gamma > UMBRAL)       direccion = 'gh';
    else if (gamma < -UMBRAL) direccion = 'ga';
  }

  iluminar(direccion);   // ilumina el cuadro correspondiente

  // Enviar comando limitando la frecuencia.
  const ahora = Date.now();
  if (ahora - ultimoEnvio >= ENVIO_CADA_MS) {
    enviarComando(direccion);
    ultimoEnvio = ahora;
  }
}

// --- ENVIAR UN COMANDO (cada direccion usa SU propia velocidad) ---
async function enviarComando(direccion) {
  if (!caracteristica) return;

  let comando;
  if (direccion === 'stop') {
    comando = 'stop';
  } else {
    const velocidad = DIRS[direccion].slider.value;   // velocidad de ESA direccion
    comando = direccion + ' ' + velocidad;
  }

  // No reenviar lo mismo repetido, salvo stop (conviene repetirlo).
  if (comando === ultimoComando && direccion !== 'stop') return;
  ultimoComando = comando;

  try {
    await caracteristica.writeValue(new TextEncoder().encode(comando));
  } catch (error) { /* silencioso durante movimiento continuo */ }
}
</script>

</body>
</html>
