<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control por Voz</title>
<style>
  /* ===================================================================
     CONTROL POR VOZ: di un comando y el robot obedece.
     Comandos: adelante, atras, izquierda, derecha, stop.
     =================================================================== */
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #1e293b;
    color: #f1f5f9;
    text-align: center;
    margin: 0;
    padding: 16px;
    user-select: none;
  }
  h1 { font-size: 22px; margin: 8px 0 16px; }

  #estado {
    background: #334155;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 12px;
    font-size: 15px;
  }

  .btn {
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 18px;
    color: white;
    cursor: pointer;
    margin-bottom: 12px;
    width: 100%;
    max-width: 360px;
  }
  .btn-conectar { background: #22c55e; }
  .btn-conectar:active { background: #16a34a; }

  /* Boton del microfono: verde para escuchar, rojo cuando esta escuchando */
  .btn-escuchar { background: #3b82f6; }
  .btn-escuchar:active { background: #1d4ed8; }
  .btn-escuchar.escuchando { background: #ef4444; }

  .panel {
    background: #334155;
    border-radius: 12px;
    padding: 14px;
    margin: 0 auto 12px;
    max-width: 360px;
  }
  .fila-vel { display: flex; align-items: center; gap: 10px; }
  .fila-vel input { flex: 1; }
  #numVel { font-size: 20px; font-weight: bold; color: #fbbf24; width: 40px; }

  /* Muestra grande del comando reconocido */
  #comandoActual {
    font-size: 30px;
    font-weight: bold;
    margin: 14px 0;
    min-height: 40px;
    color: #fbbf24;
  }

  /* Muestra lo que el microfono "escucho" (util para aprender) */
  #escuchado {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 12px;
    min-height: 18px;
  }

  /* Lista de comandos validos, como ayuda visual */
  .ayuda {
    background: #334155;
    border-radius: 10px;
    padding: 12px;
    margin: 0 auto 12px;
    max-width: 360px;
    font-size: 14px;
    color: #cbd5e1;
    line-height: 1.8;
  }

  #respuesta {
    background: #334155;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    min-height: 20px;
    max-width: 360px;
    margin: 0 auto;
  }

  .volver { color: #94a3b8; font-size: 14px; display: inline-block; margin-top: 16px; }
</style>
</head>
<body>

  <h1>🎤 Control por Voz</h1>

  <div id="estado">Desconectado</div>

  <!-- 1) Conectar al robot -->
  <button class="btn btn-conectar" id="btnConectar">Conectar al Robot</button>

  <!-- 2) Activar el microfono -->
  <button class="btn btn-escuchar" id="btnEscuchar">🎤 Empezar a Escuchar</button>

  <!-- Velocidad -->
  <div class="panel">
    <div class="fila-vel">
      <span>Velocidad:</span>
      <input type="range" id="sliderVel" min="0" max="255" value="150"
             oninput="document.getElementById('numVel').textContent = this.value">
      <span id="numVel">150</span>
    </div>
  </div>

  <!-- Comando reconocido (grande) -->
  <div id="comandoActual">⏸️</div>
  <div id="escuchado">Pulsa el microfono y di un comando</div>

  <!-- Ayuda: comandos validos -->
  <div class="ayuda">
    <b>Di uno de estos comandos:</b><br>
    🔼 "adelante" &nbsp; 🔽 "atras"<br>
    ◀️ "izquierda" &nbsp; ▶️ "derecha"<br>
    ■ "stop" o "para"
  </div>

  <div id="respuesta">Respuestas del robot apareceran aqui...</div>

  <br>
  <a class="volver" href="index.html">← Volver al menú</a>

<script>
/* =====================================================================
   LOGICA del control por voz.
   ===================================================================== */

// "Direcciones" del robot (deben coincidir con la ESP32: FFE0 / FFE1).
const SERVICE_UUID = 0xFFE0;
const CHAR_UUID    = 0xFFE1;

let caracteristica = null;
let escuchando = false;

const estado       = document.getElementById('estado');
const respuesta    = document.getElementById('respuesta');
const slider       = document.getElementById('sliderVel');
const comandoActual= document.getElementById('comandoActual');
const escuchado    = document.getElementById('escuchado');
const btnEscuchar  = document.getElementById('btnEscuchar');

// ----------------------------------------------------------------------
// TABLA DE COMANDOS: cada accion del robot con las PALABRAS que la activan.
// Los niños pueden agregar mas palabras aqui para que reconozca mejor.
// ----------------------------------------------------------------------
const COMANDOS = [
  { palabras: ['adelante', 'delante', 'avanza', 'avanzar'], accion: 'ad', icono: '🔼' },
  { palabras: ['atras', 'atrás', 'retrocede', 'reversa'],   accion: 'at', icono: '🔽' },
  { palabras: ['izquierda', 'izquierda'],                   accion: 'ga', icono: '◀️' },
  { palabras: ['derecha'],                                   accion: 'gh', icono: '▶️' },
  { palabras: ['stop', 'para', 'parar', 'alto', 'detente'], accion: 'stop', icono: '■' }
];
// ----------------------------------------------------------------------

// --- CONECTAR AL ROBOT ---
document.getElementById('btnConectar').addEventListener('click', async () => {
  try {
    estado.textContent = 'Buscando robot...';
    const dispositivo = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'ROBOT' }],
      optionalServices: [SERVICE_UUID]
    });

    dispositivo.addEventListener('gattserverdisconnected', () => {
      estado.textContent = 'Desconectado';
      caracteristica = null;
    });

    estado.textContent = 'Conectando...';
    const servidor = await dispositivo.gatt.connect();
    const servicio = await servidor.getPrimaryService(SERVICE_UUID);
    caracteristica = await servicio.getCharacteristic(CHAR_UUID);

    await caracteristica.startNotifications();
    caracteristica.addEventListener('characteristicvaluechanged', (evento) => {
      const texto = new TextDecoder().decode(evento.target.value);
      respuesta.textContent = '🤖 ' + texto;
    });

    estado.textContent = '✅ Conectado a ' + dispositivo.name;
  } catch (error) {
    estado.textContent = 'Error: ' + error.message;
  }
});

// --- CONFIGURAR EL RECONOCIMIENTO DE VOZ ---
// Algunos navegadores lo llaman SpeechRecognition, otros webkitSpeechRecognition.
const Reconocedor = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (Reconocedor) {
  recognition = new Reconocedor();
  recognition.lang = 'es-ES';        // Español
  recognition.continuous = true;     // Sigue escuchando varios comandos
  recognition.interimResults = false;// Solo resultados finales

  // Cuando reconoce algo, lo procesamos.
  recognition.onresult = (evento) => {
    // Tomamos el ultimo resultado reconocido.
    const i = evento.results.length - 1;
    const texto = evento.results[i][0].transcript.toLowerCase().trim();
    escuchado.textContent = 'Escuche: "' + texto + '"';
    interpretarVoz(texto);
  };

  // Si el reconocimiento se detiene solo (por un silencio), lo reiniciamos
  // mientras el control siga activado.
  recognition.onend = () => {
    if (escuchando) {
      try { recognition.start(); } catch (e) {}
    }
  };

  recognition.onerror = (e) => {
    escuchado.textContent = 'Error de microfono: ' + e.error;
  };
} else {
  estado.textContent = '⚠️ Este navegador no soporta reconocimiento de voz. Usa Chrome.';
}

// --- BOTON DE ESCUCHAR (activar/desactivar microfono) ---
btnEscuchar.addEventListener('click', () => {
  if (!caracteristica) {
    estado.textContent = '⚠️ Primero conecta al robot';
    return;
  }
  if (!recognition) {
    estado.textContent = '⚠️ Reconocimiento de voz no disponible';
    return;
  }

  if (!escuchando) {
    escuchando = true;
    btnEscuchar.textContent = '🛑 Dejar de Escuchar';
    btnEscuchar.classList.add('escuchando');
    try { recognition.start(); } catch (e) {}
  } else {
    escuchando = false;
    btnEscuchar.textContent = '🎤 Empezar a Escuchar';
    btnEscuchar.classList.remove('escuchando');
    recognition.stop();
    enviarComando('stop');   // seguridad: al dejar de escuchar, el robot para
  }
});

// --- INTERPRETAR EL TEXTO ESCUCHADO Y BUSCAR UN COMANDO ---
function interpretarVoz(texto) {
  // Recorremos la tabla de comandos buscando una palabra que aparezca
  // en lo que se escucho.
  for (const cmd of COMANDOS) {
    for (const palabra of cmd.palabras) {
      if (texto.includes(palabra)) {
        comandoActual.textContent = cmd.icono + ' ' + palabra;
        enviarComando(cmd.accion);
        return;   // tomamos el primer comando que coincida
      }
    }
  }
  // Si no coincidio con ninguno, lo indicamos.
  comandoActual.textContent = '❓';
}

// --- ENVIAR UN COMANDO AL ROBOT ---
async function enviarComando(accion) {
  if (!caracteristica) return;

  let comando;
  if (accion === 'stop') {
    comando = 'stop';
  } else {
    comando = accion + ' ' + slider.value;   // ej: "ad 150"
  }

  try {
    const datos = new TextEncoder().encode(comando);
    await caracteristica.writeValue(datos);
    respuesta.textContent = 'Enviado: ' + comando;
  } catch (error) {
    estado.textContent = 'Error al enviar: ' + error.message;
  }
}
</script>

</body>
</html>
