<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control por Botones</title>
<style>
  /* ===================================================================
     CONTROL POR BOTONES en forma de CRUZ, con velocidad independiente
     para cada direccion.
     =================================================================== */
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #1e293b;
    color: #f1f5f9;
    text-align: center;
    margin: 0;
    padding: 16px;
    user-select: none;
  }
  h1 { font-size: 22px; margin: 8px 0 16px; }

  #estado {
    background: #334155;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 16px;
    font-size: 15px;
  }

  .btn-conectar {
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 18px;
    margin-bottom: 20px;
    cursor: pointer;
    width: 100%;
    max-width: 360px;
  }
  .btn-conectar:active { background: #16a34a; }

  /* La cruz: 3 columnas x 3 filas */
  .cruz {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, auto);
    gap: 10px;
    max-width: 360px;
    margin: 0 auto;
  }

  /* Cada celda con boton de direccion contiene el boton + su slider */
  .celda {
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  /* Boton de direccion */
  .celda button {
    border: none;
    border-radius: 12px;
    padding: 18px 0;
    font-size: 17px;
    font-weight: bold;
    color: white;
    background: #3b82f6;
    cursor: pointer;
  }
  .celda button:active { background: #1d4ed8; }

  /* Slider pequeño debajo de cada boton */
  .mini-vel {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .mini-vel input { flex: 1; min-width: 0; }
  .mini-vel .num { color: #fbbf24; font-weight: bold; width: 30px; font-size: 13px; }

  /* Celdas vacias de las esquinas de la cruz */
  .vacio { visibility: hidden; }

  /* Boton STOP en el centro de la cruz (rojo) */
  .btn-stop {
    border: none;
    border-radius: 12px;
    background: #ef4444;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    /* ocupa toda la celda central */
    align-self: stretch;
  }
  .btn-stop:active { background: #b91c1c; }

  #respuesta {
    margin-top: 20px;
    background: #334155;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    min-height: 20px;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }
  .volver { color: #94a3b8; font-size: 14px; display: inline-block; margin-top: 16px; }
</style>
</head>
<body>

  <h1>🎮 Control por Botones</h1>

  <div id="estado">Desconectado</div>

  <button class="btn-conectar" id="btnConectar">Conectar al Robot</button>

  <!-- CRUZ de control -->
  <div class="cruz">

    <!-- Fila 1: [vacio] [ADELANTE] [vacio] -->
    <div class="vacio"></div>
    <div class="celda">
      <button onclick="enviarComando('ad', 'velAd')">▲<br>Adelante</button>
      <div class="mini-vel">
        <input type="range" id="velAd" min="0" max="255" value="150"
               oninput="document.getElementById('numAd').textContent=this.value">
        <span class="num" id="numAd">150</span>
      </div>
    </div>
    <div class="vacio"></div>

    <!-- Fila 2: [IZQUIERDA] [STOP] [DERECHA] -->
    <div class="celda">
      <button onclick="enviarComando('ga', 'velGa')">◀<br>Izquierda</button>
      <div class="mini-vel">
        <input type="range" id="velGa" min="0" max="255" value="150"
               oninput="document.getElementById('numGa').textContent=this.value">
        <span class="num" id="numGa">150</span>
      </div>
    </div>

    <button class="btn-stop" onclick="enviarComando('stop', null)">■<br>STOP</button>

    <div class="celda">
      <button onclick="enviarComando('gh', 'velGh')">▶<br>Derecha</button>
      <div class="mini-vel">
        <input type="range" id="velGh" min="0" max="255" value="150"
               oninput="document.getElementById('numGh').textContent=this.value">
        <span class="num" id="numGh">150</span>
      </div>
    </div>

    <!-- Fila 3: [vacio] [ATRAS] [vacio] -->
    <div class="vacio"></div>
    <div class="celda">
      <button onclick="enviarComando('at', 'velAt')">▼<br>Atras</button>
      <div class="mini-vel">
        <input type="range" id="velAt" min="0" max="255" value="150"
               oninput="document.getElementById('numAt').textContent=this.value">
        <span class="num" id="numAt">150</span>
      </div>
    </div>
    <div class="vacio"></div>

  </div>

  <div id="respuesta">Respuestas del robot apareceran aqui...</div>

  <br>
  <a class="volver" href="index.html">← Volver al menú</a>

<script>
/* =====================================================================
   LOGICA: Bluetooth y envio de comandos.
   ===================================================================== */
const SERVICE_UUID = 0xFFE0;
const CHAR_UUID    = 0xFFE1;

let caracteristica = null;
const estado    = document.getElementById('estado');
const respuesta = document.getElementById('respuesta');

// --- CONECTAR AL ROBOT ---
document.getElementById('btnConectar').addEventListener('click', async () => {
  try {
    estado.textContent = 'Buscando robot...';
    const dispositivo = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'ROBOT' }],
      optionalServices: [SERVICE_UUID]
    });
    dispositivo.addEventListener('gattserverdisconnected', () => {
      estado.textContent = 'Desconectado';
      caracteristica = null;
    });
    estado.textContent = 'Conectando...';
    const servidor = await dispositivo.gatt.connect();
    const servicio = await servidor.getPrimaryService(SERVICE_UUID);
    caracteristica = await servicio.getCharacteristic(CHAR_UUID);
    await caracteristica.startNotifications();
    caracteristica.addEventListener('characteristicvaluechanged', (evento) => {
      respuesta.textContent = '🤖 ' + new TextDecoder().decode(evento.target.value);
    });
    estado.textContent = '✅ Conectado a ' + dispositivo.name;
  } catch (error) {
    estado.textContent = 'Error: ' + error.message;
  }
});

// --- ENVIAR UN COMANDO ---
// accion: 'ad','at','ga','gh','stop'. idSlider: el slider de esa direccion (o null).
async function enviarComando(accion, idSlider) {
  if (!caracteristica) {
    estado.textContent = '⚠️ Primero conecta al robot';
    return;
  }
  let comando;
  if (accion === 'stop') {
    comando = 'stop';
  } else {
    const velocidad = document.getElementById(idSlider).value;
    comando = accion + ' ' + velocidad;
  }
  try {
    await caracteristica.writeValue(new TextEncoder().encode(comando));
    respuesta.textContent = 'Enviado: ' + comando;
  } catch (error) {
    estado.textContent = 'Error al enviar: ' + error.message;
  }
}
</script>

</body>
</html>
